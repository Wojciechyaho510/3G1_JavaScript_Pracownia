<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>Bednarek Z56_JS</title>

    <script language="JavaScript">

        var imie_bed = prompt("Podaj imię:");
        var nazwisko_bed = prompt("Podaj nazwisko:");

        var a_bed = (nazwisko_bed.length % 4) + 5;
        var b_bed = (imie_bed.length % 6) + 20;

        for (var j_bed = 1; j_bed <= b_bed; j_bed++)
        {
            document.write("*");
        }
        document.write("<br>");

        for (var i_bed = 1; i_bed <= a_bed - 2; i_bed++)
        {
            document.write("*");

            for (var j_bed = 1; j_bed <= b_bed - 2; j_bed++)
            {
                document.write("&nbsp;&nbsp;");
            }

            document.write("*<br>");
        }

        for (var j_bed = 1; j_bed <= b_bed; j_bed++)
        {
            document.write("*");
        }

        document.write("<br>");

    </script>

</head>
