<b>5. Operatory porównania.</b><br>

<table border="1">
<tr>
<th>Operator</th>
<th>Opis</th>
<th>Przykład</th>
</tr>

<tr>
<td>==</td>
<td>jest równe</td>
<td>2==3 wynik → fałsz</td>
</tr>

<tr>
<td>!=</td>
<td>nie jest równe</td>
<td>2!=3 wynik → prawda</td>
</tr>

<tr>
<td>&gt;</td>
<td>jest większe</td>
<td>25&gt;3 wynik → prawda</td>
</tr>

<tr>
<td>&lt;</td>
<td>jest mniejsze</td>
<td>2&lt;3 wynik → prawda</td>
</tr>

<tr>
<td>&gt;=</td>
<td>większe lub równe</td>
<td>25&gt;=3 wynik → prawda</td>
</tr>

<tr>
<td>&lt;=</td>
<td>mniejsze lub równe</td>
<td>2&lt;=3 wynik → prawda</td>
</tr>
</table>

<br>

<b>6. Uwaga do operatorów porównania.</b><br>
Należy odróżnić == (dwa razy) od = (jeden raz).<br>
== → instrukcja porównania.<br>
= → instrukcja przypisania, np. a=5;<br><br>

<b>7. Operatory logiczne.</b><br>

<table border="1">
<tr>
<th>Operator</th>
<th>Opis</th>
<th>Przykład</th>
</tr>

<tr>
<td>&&</td>
<td>i</td>
<td>x=3, y=4, (x&lt;9 && y&gt;2) → prawda</td>
</tr>

<tr>
<td>||</td>
<td>lub</td>
<td>x=3, y=4, (x==8 || y==6) → fałsz</td>
</tr>

<tr>
<td>!</td>
<td>zaprzeczenie</td>
<td>x=3, y=4, !(x==y) → prawda</td>
</tr>

</table>
