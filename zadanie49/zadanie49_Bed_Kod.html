<!DOCTYPE html>

<meta charset="utf-8">
<title>Bednarek Z49_JS</title>
</head>

<body>

<div style="color:red;font-size:40px;">

<script>

do
{
var a_bed=parseFloat(prompt("Podaj bok a",""));
var b_bed=parseFloat(prompt("Podaj bok b",""));
var c_bed=parseFloat(prompt("Podaj bok c",""));

}
while(
!(a_bed>0 &&
b_bed>0 &&
c_bed>0 &&
a_bed+b_bed>c_bed &&
a_bed+c_bed>b_bed &&
b_bed+c_bed>a_bed)
);

document.write("Boki tworzą trójkąt.<br>");
document.write("a="+a_bed+"<br>");
document.write("b="+b_bed+"<br>");
document.write("c="+c_bed);

</script>
