<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Bednarek Z57_JS</title>
</head>

<body>

<script>

do
{
    var l1_t_bed = parseInt(prompt("Podaj liczbę z przedziału <20,60>",""));

    if(l1_t_bed<20 || l1_t_bed>60)
    {
        alert("Liczba l1 nie należy do przedziału <20,60>");
    }

}
while(l1_t_bed<20 || l1_t_bed>60);

do
{
    var l2_t_bed = parseInt(prompt("Podaj drugą liczbę z przedziału <20,60>",""));

    if(l2_t_bed<20 || l2_t_bed>60)
    {
        alert("Liczba l2 nie należy do przedziału <20,60>");
    }

}
while(l2_t_bed<20 || l2_t_bed>60);

var pocz_bed = parseInt(prompt("Podaj początkową wielkość tekstu",""));
var tekst_bed = prompt("Podaj tekst","Wojciech Bednarek");

if(l1_t_bed<l2_t_bed)
{
    for(var i_bed=pocz_bed;i_bed<=100;i_bed=i_bed+5)
    {
        document.write("<p style=\"font-size:"+i_bed+"px;\">"+tekst_bed+"</p>");
    }
}
else if(l1_t_bed>l2_t_bed)
{
    for(var i_bed=pocz_bed;i_bed>=0;i_bed=i_bed-5)
    {
        document.write("<p style=\"font-size:"+i_bed+"px;\">"+tekst_bed+"</p>");
    }
}
else
{
    document.write("<p style=\"font-size:"+pocz_bed+"px;\">"+tekst_bed+"</p>");
}

</script>

</body>
</html>
