<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Bednarek Z47_JS</title>
</head>

<body>

<script>

var ile_razy_bed=10;
var wielkosc_bed=42;

document.write("Ilość wykonania pętli = "
+ile_razy_bed+"<br>");

document.write("Wielkość liter = "
+wielkosc_bed+"px<br><br>");

var liczba_bed=
parseInt(prompt("Podaj liczbę",""));

if(liczba_bed%2==0)
{
for(var i_bed=1;i_bed<=ile_razy_bed;i_bed++)
{
document.write(
"<span style='color:blue;font-size:"
+wielkosc_bed+
"px;'>Bednarek</span><br>"
);
}
}
else
{
for(var i_bed=1;i_bed<=ile_razy_bed;i_bed++)
{
document.write(
"<span style='color:green;font-size:"
+wielkosc_bed+
"px;'>Wojciech</span><br>"
);
}
}

</script>

</body>
</html>
