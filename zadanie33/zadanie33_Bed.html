<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 33 - Wojciech Bednarek</title>

<script type="text/javascript">

function User(email, password, avatar)
{
    this.email = email;
    this.password = password;
    this.avatar = avatar;
}

var userList = {
    users: [],

    addUser: function(user)
    {
        this.users.push(user);
    },

    login: function(email, password)
    {
        for(var i = 0; i < this.users.length; i++)
        {
            if(
                this.users[i].email === email &&
                this.users[i].password === password
            )
            {
                return true;
            }
        }
        return false;
    }
};

userList.addUser(
    new User(
        "wojciech@wp.pl",
        "12345",
        "https://via.placeholder.com/80"
    )
);

function zaloguj()
{
    var email = document.getElementById("email").value;
    var haslo = document.getElementById("haslo").value;

    if(userList.login(email, haslo))
    {
        document.getElementById("wynik").innerHTML =
        "Logowanie poprawne";
    }
    else
    {
        document.getElementById("wynik").innerHTML =
        "Błędny login lub hasło";
    }
}

</script>
</head>

<body>

<h2>Zadanie 33 - Logowanie użytkownika</h2>

Email:<br>
<input type="text" id="email"><br><br>

Hasło:<br>
<input type="password" id="haslo"><br><br>

<input type="button" value="Zaloguj" onclick="zaloguj()">

<p id="wynik"></p>

</body>
</html>
